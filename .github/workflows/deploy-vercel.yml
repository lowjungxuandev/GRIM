name: Deploy Backend To Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-vercel.yml"
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - name: Check required GitHub variables
        run: |
          required_vars=(
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_PROJECT_ID
            CLOUDINARY_URL
            FIREBASE_PROJECT_ID
            FIREBASE_DATABASE_URL
            FIREBASE_SERVICE_ACCOUNT_JSON_BASE64
            EXTRACT_LLM_PROVIDER
            EXTRACT_LLM_API_KEY
            EXTRACT_LLM_MODEL
            FINAL_LLM_PROVIDER
            FINAL_LLM_API_KEY
            FINAL_LLM_MODEL
          )

          missing=()
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing GitHub repository variables:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            exit 1
          fi
        env:
          CLOUDINARY_URL: ${{ vars.CLOUDINARY_URL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ vars.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          EXTRACT_LLM_PROVIDER: ${{ vars.EXTRACT_LLM_PROVIDER }}
          EXTRACT_LLM_API_KEY: ${{ vars.EXTRACT_LLM_API_KEY }}
          EXTRACT_LLM_MODEL: ${{ vars.EXTRACT_LLM_MODEL }}
          FINAL_LLM_PROVIDER: ${{ vars.FINAL_LLM_PROVIDER }}
          FINAL_LLM_API_KEY: ${{ vars.FINAL_LLM_API_KEY }}
          FINAL_LLM_MODEL: ${{ vars.FINAL_LLM_MODEL }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Pull Vercel project settings
        run: vercel --cwd backend pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: |
          vercel --cwd backend deploy --prod --yes --token="$VERCEL_TOKEN" \
            -e CLOUDINARY_URL="$CLOUDINARY_URL" \
            -e FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            -e FIREBASE_DATABASE_URL="$FIREBASE_DATABASE_URL" \
            -e FIREBASE_SERVICE_ACCOUNT_JSON_BASE64="$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" \
            -e EXTRACT_LLM_PROVIDER="$EXTRACT_LLM_PROVIDER" \
            -e EXTRACT_LLM_API_KEY="$EXTRACT_LLM_API_KEY" \
            -e EXTRACT_LLM_MODEL="$EXTRACT_LLM_MODEL" \
            -e FINAL_LLM_PROVIDER="$FINAL_LLM_PROVIDER" \
            -e FINAL_LLM_API_KEY="$FINAL_LLM_API_KEY" \
            -e FINAL_LLM_MODEL="$FINAL_LLM_MODEL" \
            -e GRIM_FCM_TOPIC="${GRIM_FCM_TOPIC:-}" \
            -e EXTRACT_LLM_BASE_URL="${EXTRACT_LLM_BASE_URL:-}" \
            -e FINAL_LLM_BASE_URL="${FINAL_LLM_BASE_URL:-}" \
            -e LLM_PROVIDER="${LLM_PROVIDER:-}" \
            -e LLM_API_KEY="${LLM_API_KEY:-}" \
            -e LLM_MODEL="${LLM_MODEL:-}" \
            -e LLM_BASE_URL="${LLM_BASE_URL:-}" \
            -e GRIM_PROMPT_ADMIN_SECRET="${GRIM_PROMPT_ADMIN_SECRET:-}" \
            -e SCALAR_DOCS_URL="${SCALAR_DOCS_URL:-}"
        env:
          CLOUDINARY_URL: ${{ vars.CLOUDINARY_URL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ vars.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          EXTRACT_LLM_PROVIDER: ${{ vars.EXTRACT_LLM_PROVIDER }}
          EXTRACT_LLM_API_KEY: ${{ vars.EXTRACT_LLM_API_KEY }}
          EXTRACT_LLM_MODEL: ${{ vars.EXTRACT_LLM_MODEL }}
          EXTRACT_LLM_BASE_URL: ${{ vars.EXTRACT_LLM_BASE_URL }}
          FINAL_LLM_PROVIDER: ${{ vars.FINAL_LLM_PROVIDER }}
          FINAL_LLM_API_KEY: ${{ vars.FINAL_LLM_API_KEY }}
          FINAL_LLM_MODEL: ${{ vars.FINAL_LLM_MODEL }}
          FINAL_LLM_BASE_URL: ${{ vars.FINAL_LLM_BASE_URL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_API_KEY: ${{ vars.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          GRIM_FCM_TOPIC: ${{ vars.GRIM_FCM_TOPIC }}
          GRIM_PROMPT_ADMIN_SECRET: ${{ vars.GRIM_PROMPT_ADMIN_SECRET }}
          SCALAR_DOCS_URL: ${{ vars.SCALAR_DOCS_URL }}
