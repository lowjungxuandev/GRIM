name: mobile
description: "GRIM mobile client."
publish_to: 'none'
version: 0.1.5+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  wakelock_plus: ^1.2.10
  grim_core:
    path: packages/grim_core
  grim_image_full_screen:
    path: packages/grim_image_full_screen
  grim_splash:
    path: packages/grim_splash
  grim_notification_dialog:
    path: packages/grim_notification_dialog
  grim_receiver_grid:
    path: packages/grim_receiver_grid
  grim_role_select:
    path: packages/grim_role_select
  grim_sender_camera:
    path: packages/grim_sender_camera

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_foreground_inset: 18
