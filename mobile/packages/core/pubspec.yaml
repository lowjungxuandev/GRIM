publish_to: none
environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^21.0.0
  gal: ^2.3.2
  google_fonts: ^8.1.0
  device_info_plus: ^13.1.0
  dio: ^5.9.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_riverpod: ^3.3.1
  pretty_dio_logger: ^1.4.0
  camera: ^0.12.0+1
